<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Tools - Math Practice</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; padding: 0; color: white;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        .quiz-container {
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 15px;
        }
        .question {
            margin-bottom: 25px;
        }
        input, button {
            padding: 10px 15px;
            margin-top: 8px;
            border-radius: 6px;
            border: none;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .result {
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
            display: none;
        }
        .hidden-game {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">School Tools - Math Practice</div>
    
    <div class="container">
        <div class="quiz-container" id="quiz">
            <h2>Complete the Math Quiz to unlock the next tool</h2>
            
            <form id="mathForm">
                <!-- Questions will be added by JavaScript -->
            </form>

            <button onclick="submitQuiz()">Submit Answers</button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <!-- Hidden Retro Bowl Game -->
    <div id="gameContainer" class="hidden-game">
        <iframe id="gameFrame" src="https://www.retrobowl.me/" allowfullscreen></iframe>
    </div>

    <script>
        const questions = [
            "What is 15 × 8?",
            "Solve: 144 ÷ 12 = ?",
            "What is 25% of 80?",
            "What is 7³?",
            "Solve: 5x = 45. What is x?",
            "What is the square root of 169?",
            "What is 2.5 × 4.8?",
            "How many degrees in a right angle?",
            "What is 13 × 13?",
            "Solve: 48 ÷ 6 × 3 = ?"
        ];

        const answers = ["120", "12", "20", "343", "9", "13", "12", "90", "169", "24"];

        let formHTML = "";
        questions.forEach((q, i) => {
            formHTML += `
                <div class="question">
                    <p><strong>${i+1}. ${q}</strong></p>
                    <input type="text" id="q${i}" placeholder="Your answer">
                </div>`;
        });
        document.getElementById("mathForm").innerHTML = formHTML;

        function submitQuiz() {
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `
                <h2>You got 5 out of 10 correct.</h2>
                <p>Not bad! Keep practicing.</p>
                <button onclick="unlockGame()" style="background:#2196F3; padding:12px 25px; font-size:18px;">
                    Continue to Next Tool
                </button>
            `;
        }

        function unlockGame() {
            document.getElementById("quiz").style.display = "none";
            document.getElementById("result").style.display = "none";
            document.getElementById("gameContainer").style.display = "block";
        }

        // Press ESC to close game
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                document.getElementById("gameContainer").style.display = "none";
            }
        });
    </script>
</body>
</html>
