<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Tools - Dashboard</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; padding: 0; color: white;
            height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.2);
        }
        .hidden-game {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">School Tools - Dashboard</div>
    
    <div class="container">
        <div class="grid">
            <div class="card" onclick="alert('Calculator opening... (demo)')">
                <h2>🧮 Calculator</h2>
                <p>Basic & Scientific calculator</p>
            </div>
            <div class="card" onclick="alert('Notes opening... (demo)')">
                <h2>📝 Notes</h2>
                <p>Quick note taking tool</p>
            </div>
            <div class="card" onclick="alert('Dictionary opening... (demo)')">
                <h2>📖 Dictionary</h2>
                <p>Word definitions & thesaurus</p>
            </div>
            <div class="card" onclick="showGame()">
                <h2>🏈 Retro Bowl</h2>
                <p>Classic football game (for stress relief)</p>
            </div>
        </div>
    </div>

    <div id="gameContainer" class="hidden-game">
        <iframe id="gameFrame" src="https://www.retrobowl.me/" allowfullscreen></iframe>
    </div>

    <script>
        function showGame() {
            document.getElementById("gameContainer").style.display = "block";
        }
        
        // Press ESC to close the game
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                document.getElementById("gameContainer").style.display = "none";
            }
        });
    </script>
</body>
</html>
